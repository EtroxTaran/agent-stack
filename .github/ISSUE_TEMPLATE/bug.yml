name: Bug Report
description: Report a bug with reproduction steps and Gherkin fix-criteria
title: "fix: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        # Bug Report

        Alle Felder ausfüllen. Die AC (Gherkin) beschreibt den *gewünschten fix-behavior* —
        nicht den Bug. So kann Stage 5 (AC-Validation) später prüfen, ob der PR das Fix wirklich liefert.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Was ist passiert? Welche Komponente ist betroffen?"
      placeholder: "Beim Klick auf ... passiert ..."
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: "Was sollte stattdessen passieren?"
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: "Minimal reproduzierbare Schrittfolge."
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Browser/OS/CLI-Versionen, relevante Feature-Flags, Host (r2d2/Laptop)."
      placeholder: "Firefox 142 · Ubuntu 25.10 · Node 22.4 · ai-portal v2.3.1"
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria (Gherkin)
      description: "Gherkin beschreibt das FIX-Verhalten. Mapping 1:1 auf Tests."
      value: |
        ```gherkin
        Scenario: <Kurztitel — fix behavior>
          Given <buggy Vorbedingung>
          When <user-Aktion, die vorher fehlschlug>
          Then <erwartetes Ergebnis nach Fix>

        Scenario: Regression-Guard
          Given <Ausgangssituation>
          When <Aktion>
          Then <der Bug tritt nicht erneut auf>
        ```
    validations:
      required: true

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: |
        - [ ] Regression-Test für den Bug (failing vor Fix, green danach)
        - [ ] Root-Cause im PR-Body dokumentiert
        - [ ] PR mit `Closes #<this>` verlinkt
        - [ ] AI-Review-Pipeline 4/5 Stages grün
    validations:
      required: true

  - type: input
    id: priority
    attributes:
      label: Priority
      description: "P0 (critical — hotfix), P1 (high), P2 (medium), P3 (low)"
      value: P2
    validations:
      required: false
