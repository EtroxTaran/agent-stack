# Weekly Model-Registry Drift Check
#
# Monday 08:00 UTC — ruft scripts/model-registry-drift-check.py gegen die
# committed Registry in ai-review-pipeline/registry/MODEL_REGISTRY.env.
# Bei Drift: PR in EtroxTaran/ai-review-pipeline mit Registry-Update.
#
# Siehe: ~/.claude/plans/snuggly-wiggling-moler.md (Always-Latest-Models).

name: Model Registry Drift Check

on:
  schedule:
    # Montag 08:00 UTC — früh genug um Drift am Montagmorgen zu sehen,
    # spät genug dass Vendor-Releases vom Freitag gerade abend bei den
    # List-Endpoints sichtbar sind.
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Nur Report, kein PR"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout agent-stack (für das Drift-Check-Skript)
        uses: actions/checkout@v4
        with:
          path: agent-stack

      - name: Checkout ai-review-pipeline (für die Registry)
        uses: actions/checkout@v4
        with:
          repository: EtroxTaran/ai-review-pipeline
          path: ai-review-pipeline
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Drift-Check
        id: drift
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -eo pipefail
          cd ai-review-pipeline
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          # Exit-Code: 0 = no drift, 1 = drift applied, 2 = registry missing
          set +e
          python3 ../agent-stack/scripts/model-registry-drift-check.py \
            --registry-path registry/MODEL_REGISTRY.env \
            --output /tmp/drift-report.json \
            $DRY_FLAG
          EXIT=$?
          set -e
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          if [ -f /tmp/drift-report.json ]; then
            echo "has_report=true" >> "$GITHUB_OUTPUT"
            cat /tmp/drift-report.json
          fi
          # Nur Exit 0 oder 1 ist acceptable — 2 ist harter Bug
          [ "$EXIT" -le 1 ]

      - name: Upload Drift Report Artifact
        if: steps.drift.outputs.has_report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: /tmp/drift-report.json
          retention-days: 30

      - name: Create or update drift-PR in ai-review-pipeline
        if: steps.drift.outputs.exit_code == '1' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          set -euo pipefail
          cd ai-review-pipeline

          BRANCH="chore/model-registry-drift-$(date -u +%Y%m%d)"
          git config user.name "Nathan Bot"
          git config user.email "noreply@anthropic.com"

          # Existiert schon ein Drift-PR? Falls ja: neuer Commit auf denselben Branch
          if gh pr list --repo EtroxTaran/ai-review-pipeline --state open \
                --head "$BRANCH" --json number --jq '.[].number' | grep -q .; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          git add registry/MODEL_REGISTRY.env
          if git diff --cached --quiet; then
            echo "Kein Diff trotz Exit=1 — suspicious, abort."
            exit 1
          fi

          # PR-Body enthält den Drift-Report
          cat > /tmp/pr-body.md <<EOF
          ## Weekly Model-Registry Drift

          Automatisch erkannte Drift zwischen aktuell verfügbaren Vendor-Modellen
          und der gepinnten Registry.

          ### Änderungen

          \`\`\`json
          $(cat /tmp/drift-report.json)
          \`\`\`

          ### Review-Hinweise

          - ❓ **Stabilität:** Ist das neue Modell bereits production-ready oder nur Preview?
          - ❓ **Kosten:** Preisunterschied checken (Anthropic/OpenAI/Gemini-Pricing-Pages)
          - ❓ **Breaking changes:** Vendor-Changelog prüfen
          - ✅ **CI:** Muss grün sein, inklusive Dogfood-Self-Review

          ### Rollback

          Falls das neue Modell schlechter reviewed: PR revert → 5 Min bis alter Zustand wieder live.

          ---
          🤖 Generated by [agent-stack/.github/workflows/model-registry-drift-check.yml](https://github.com/EtroxTaran/agent-stack/blob/main/.github/workflows/model-registry-drift-check.yml)
          EOF

          git commit -m "chore: weekly model-registry drift update ($(date -u +%Y-%m-%d))"
          git push origin "$BRANCH"

          # PR erstellen (oder falls existent nur aktualisieren)
          if ! gh pr list --repo EtroxTaran/ai-review-pipeline --state open \
                 --head "$BRANCH" --json number --jq '.[].number' | grep -q .; then
            gh pr create \
              --repo EtroxTaran/ai-review-pipeline \
              --title "chore: weekly model-registry drift update" \
              --body-file /tmp/pr-body.md \
              --base main \
              --head "$BRANCH"
          else
            echo "PR bereits offen auf $BRANCH — Commit angehängt."
          fi
